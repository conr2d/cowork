name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Frontend (SvelteKit-static): formatting, lint, type-check, and the static build.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  # Guest CLI (`cowork`): host-agnostic, verified on Linux (its real runtime is WSL).
  guest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -p cowork --all-targets -- -D warnings
      - run: cargo test -p cowork
      - run: cargo build -p cowork
      - run: cargo clippy -p cowork-errors --all-targets -- -D warnings
      - run: cargo test -p cowork-errors
      - run: cargo build -p cowork-errors
      # cowork-host: host crate, but its decision logic is platform-independent
      # and unit-tested here. The cfg(windows) probe is compiled on the host job.
      - run: cargo clippy -p cowork-host --all-targets -- -D warnings
      - run: cargo test -p cowork-host

  # Conformance gates (the unit-seal gate). WP0: host/guest separation.
  # WP2 adds the errors.json single-source + 3-locale parity check here.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Host/guest separation
        run: python3 scripts/conformance/host_guest_separation.py

  # Host driver (`cowork-app` → Cowork.exe): Windows is the real target (WebView2,
  # wsl.exe, ConPTY, registry). Verified on windows-latest.
  host:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      # tauri-build reads tauri.conf.json and requires the frontend bundle to exist.
      - run: pnpm build
      - run: cargo build -p cowork-app
      - run: cargo clippy -p cowork-app --all-targets -- -D warnings
      # cowork-host: compile the cfg(windows) probe (windows-sys/wmi/winreg)
      # and clippy it on the real Windows target.
      - run: cargo build -p cowork-host
      - run: cargo clippy -p cowork-host --all-targets -- -D warnings

  # WP10 PR smoke gate (guest half): run the REAL bootstrap + agent install on a
  # clean Ubuntu 24.04 — the same base as the provisioned distro — as a non-root
  # user with passwordless sudo (mirroring the distro's firstboot user). This is
  # the throwaway clean-room the WP7 happy-path was deferred to: it exercises the
  # real external installers (the top v0.1 failure variable) and the full bootstrap
  # that the unit tests (command construction only) cannot. No login — OAuth is
  # interactive and lives in the Hyper-V full gate.
  guest-e2e:
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      # git for checkout, build-essential for cargo, sudo/curl for the bootstrap;
      # the remaining apt prerequisites are installed by the bootstrap itself.
      - name: Base tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git sudo curl ca-certificates build-essential
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p cowork --release
      - name: Install the guest binary + a firstboot-like user
        run: |
          install -m 0755 target/release/cowork /usr/local/bin/cowork
          useradd -m -s /bin/bash cowork
          echo 'cowork ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/cowork
      - name: Bootstrap + install codex (no login)
        run: |
          sudo -u cowork -i cowork bootstrap
          sudo -u cowork -i cowork agent-install --agent codex
      # Assert by absolute path (a non-interactive shell returns early from the
      # default ~/.bashrc, so brew/mise are not on PATH here — that is expected;
      # the real terminal is interactive).
      - name: Assert the happy path
        run: |
          sudo -u cowork -i bash -c '
            set -euo pipefail
            test -d "$HOME/cowork"
            test -x /home/linuxbrew/.linuxbrew/bin/brew
            test -x "$HOME/.local/bin/mise"
            test -x "$HOME/.local/bin/codex"
            grep -q CODEX_HOME "$HOME/.bashrc"
          '

  # WP10 ② wsl-integration (non-required follow-up): exercise the REAL WSL2 path on
  # a hosted windows-2025 runner (`windows-latest` migrated to 2025; WSL2 works here
  # — the "WSL2 is not supported" report is Azure-DevOps-only). This covers the
  # host<->guest substrate the docker-based guest-e2e cannot: a genuine `wsl --import`
  # of the published rootfs (new .tar.gz format, supported on WSL >= 2.4.4), the
  # guest binary injected through the host's own \\wsl.localhost\Cowork copy path
  # (the WP5 mechanism), the injected musl binary executing under the real WSL2
  # kernel, and the `wsl --unregister` teardown (the Remove Cowork path). OAuth is
  # interactive and stays in the Hyper-V full gate. continue-on-error until stable,
  # then promote to required.
  wsl-integration-guest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      # The same static-pie musl binary the installer embeds — it runs as-is on the
      # glibc WSL Ubuntu, so the real injected artifact is exercised, not a gnu rebuild.
      - run: cargo build -p cowork --target x86_64-unknown-linux-musl --release
      - uses: actions/upload-artifact@v4
        with:
          name: wsl-guest-musl-x64
          path: target/x86_64-unknown-linux-musl/release/cowork
          if-no-files-found: error

  wsl-integration:
    needs: wsl-integration-guest
    runs-on: windows-latest # = windows-2025
    continue-on-error: true # non-required follow-up until proven stable
    env:
      WSL_UTF8: '1' # force wsl.exe UTF-8 output (default UTF-16LE corrupts captured logs)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wsl-guest-musl-x64
          path: guest
      - name: Ensure a modern WSL (>= 2.4.4 for .tar.gz import) defaulting to v2
        shell: pwsh
        run: |
          wsl --update
          wsl --version
          wsl --set-default-version 2
      - name: Download the published Cowork rootfs
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download rootfs-ubuntu-24.04 --repo $env:GITHUB_REPOSITORY `
            --pattern cowork-ubuntu-24.04-rootfs.tar.gz --dir rootfs
      - name: Import the Cowork distro (real wsl --import, new tar format)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path distro | Out-Null
          wsl --import Cowork distro rootfs\cowork-ubuntu-24.04-rootfs.tar.gz --version 2
          wsl -l -v
          wsl -d Cowork -u root -- true # start once so \\wsl.localhost\Cowork is mounted
      - name: Inject the guest binary via the host's \\wsl.localhost copy path
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path \\wsl.localhost\Cowork\usr\local\bin | Out-Null
          Copy-Item guest\cowork \\wsl.localhost\Cowork\usr\local\bin\cowork -Force
          wsl -d Cowork -u root -- chmod 0755 /usr/local/bin/cowork
          wsl -d Cowork -u root -- /usr/local/bin/cowork --version
      - name: Create a firstboot-like user, then bootstrap + install codex (no login)
        shell: pwsh
        run: |
          wsl -d Cowork -u root -- useradd -m -s /bin/bash cowork
          wsl -d Cowork -u root -- bash -c "echo 'cowork ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/cowork"
          wsl -d Cowork -u cowork -- /usr/local/bin/cowork bootstrap
          wsl -d Cowork -u cowork -- /usr/local/bin/cowork agent-install --agent codex
      - name: Assert the happy path inside real WSL (by absolute path)
        shell: pwsh
        run: |
          wsl -d Cowork -u cowork -- bash -c 'set -euo pipefail; test -d "$HOME/cowork" && test -x /home/linuxbrew/.linuxbrew/bin/brew && test -x "$HOME/.local/bin/mise" && test -x "$HOME/.local/bin/codex" && grep -q CODEX_HOME "$HOME/.bashrc"'
      - name: Unregister the distro (validate the Remove Cowork teardown)
        if: always()
        shell: pwsh
        run: wsl --unregister Cowork
