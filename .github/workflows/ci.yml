name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Frontend (SvelteKit-static): formatting, lint, type-check, and the static build.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  # Guest CLI (`cowork`): host-agnostic, verified on Linux (its real runtime is WSL).
  guest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -p cowork --all-targets -- -D warnings
      - run: cargo test -p cowork
      - run: cargo build -p cowork
      - run: cargo clippy -p cowork-errors --all-targets -- -D warnings
      - run: cargo test -p cowork-errors
      - run: cargo build -p cowork-errors
      # cowork-host: host crate, but its decision logic is platform-independent
      # and unit-tested here. The cfg(windows) probe is compiled on the host job.
      - run: cargo clippy -p cowork-host --all-targets -- -D warnings
      - run: cargo test -p cowork-host

  # Conformance gates (the unit-seal gate). WP0: host/guest separation.
  # WP2 adds the errors.json single-source + 3-locale parity check here.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Host/guest separation
        run: python3 scripts/conformance/host_guest_separation.py

  # Host driver (`cowork-app` → Cowork.exe): Windows is the real target (WebView2,
  # wsl.exe, ConPTY, registry). Verified on windows-latest.
  host:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      # tauri-build reads tauri.conf.json and requires the frontend bundle to exist.
      - run: pnpm build
      - run: cargo build -p cowork-app
      - run: cargo clippy -p cowork-app --all-targets -- -D warnings
      # cowork-host: compile the cfg(windows) probe (windows-sys/wmi/winreg)
      # and clippy it on the real Windows target.
      - run: cargo build -p cowork-host
      - run: cargo clippy -p cowork-host --all-targets -- -D warnings

  # WP10 PR smoke gate (guest half): run the REAL bootstrap + agent install on a
  # clean Ubuntu 24.04 — the same base as the provisioned distro — as a non-root
  # user with passwordless sudo (mirroring the distro's firstboot user). This is
  # the throwaway clean-room the WP7 happy-path was deferred to: it exercises the
  # real external installers (the top v0.1 failure variable) and the full bootstrap
  # that the unit tests (command construction only) cannot. No login — OAuth is
  # interactive and lives in the Hyper-V full gate.
  guest-e2e:
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      # git for checkout, build-essential for cargo, sudo/curl for the bootstrap;
      # the remaining apt prerequisites are installed by the bootstrap itself.
      - name: Base tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git sudo curl ca-certificates build-essential
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p cowork --release
      - name: Install the guest binary + a firstboot-like user
        run: |
          install -m 0755 target/release/cowork /usr/local/bin/cowork
          useradd -m -s /bin/bash cowork
          echo 'cowork ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/cowork
      - name: Bootstrap + install codex (no login)
        run: |
          sudo -u cowork -i cowork bootstrap
          sudo -u cowork -i cowork agent-install --agent codex
      # Assert by absolute path (a non-interactive shell returns early from the
      # default ~/.bashrc, so brew/mise are not on PATH here — that is expected;
      # the real terminal is interactive).
      - name: Assert the happy path
        run: |
          sudo -u cowork -i bash -c '
            set -euo pipefail
            test -d "$HOME/cowork"
            test -x /home/linuxbrew/.linuxbrew/bin/brew
            test -x "$HOME/.local/bin/mise"
            test -x "$HOME/.local/bin/codex"
            grep -q CODEX_HOME "$HOME/.bashrc"
          '
